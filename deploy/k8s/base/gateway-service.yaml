apiVersion: v1
kind: Service
metadata:
  name: nipun-ai-gateway
  namespace: nipun-ai
  labels:
    app.kubernetes.io/name: nipun-ai-gateway
    app.kubernetes.io/part-of: nipun-ai
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: nipun-ai-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443

