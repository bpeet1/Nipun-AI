apiVersion: apps/v1
kind: Deployment
metadata:
  name: nipun-ai-gateway
  namespace: nipun-ai
  labels:
    app.kubernetes.io/name: nipun-ai-gateway
    app.kubernetes.io/part-of: nipun-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nipun-ai-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nipun-ai-gateway
        app.kubernetes.io/part-of: nipun-ai
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: tls
              mountPath: /etc/nginx/tls
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: https
              scheme: HTTPS
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: https
              scheme: HTTPS
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: nipun-ai-gateway-nginx
        - name: tls
          secret:
            secretName: nipun-ai-tls

