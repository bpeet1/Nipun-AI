apiVersion: v1
kind: Service
metadata:
  name: nipun-ai-frontend
  namespace: nipun-ai
  annotations:
    metallb.universe.tf/allow-shared-ip: nipun-ai
  labels:
    app.kubernetes.io/name: nipun-ai-frontend
    app.kubernetes.io/part-of: nipun-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nipun-ai-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5173
