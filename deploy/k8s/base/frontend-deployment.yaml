apiVersion: apps/v1
kind: Deployment
metadata:
  name: nipun-ai-frontend
  namespace: nipun-ai
  labels:
    app.kubernetes.io/name: nipun-ai-frontend
    app.kubernetes.io/part-of: nipun-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nipun-ai-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nipun-ai-frontend
        app.kubernetes.io/part-of: nipun-ai
    spec:
      containers:
        - name: frontend
          image: node:20-bookworm-slim
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
              name: http
          env:
            - name: NIPUN_REPO
              value: https://github.com/myProjectsRavi/Nipun-AI.git
            - name: NIPUN_REF
              value: main
            - name: VITE_WORKER_URL
              value: https://10.0.0.220
            - name: VITE_DEMO_ONLY
              value: "false"
          command:
            - /bin/sh
            - -ec
            - |
              apt-get update -qq >/dev/null
              apt-get install -y --no-install-recommends git ca-certificates >/dev/null
              mkdir -p /opt/nipun
              if [ ! -d /opt/nipun/repo/.git ]; then
                git clone --depth 1 "${NIPUN_REPO}" /opt/nipun/repo
              fi
              cd /opt/nipun/repo
              git fetch --depth 1 origin "${NIPUN_REF}"
              git checkout -f FETCH_HEAD
              cd frontend
              npm ci --silent
              npm run build
              exec npx vite preview --host 0.0.0.0 --port 5173
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 40
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
